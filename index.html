<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: monospace; background: #fff; padding: 40px; color: #1a1a1a; }
        .demo-container { max-width: 700px; margin: 0 auto; border: 1px solid #eee; padding: 20px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; font-size: 0.8rem; }
        .label { color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .btn { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; margin-top: 20px; font-family: monospace; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="demo-container">
    <h3>Soil Pulse: Single Farm Tracer</h3>
    <p class="label">Location: Nebbi District, Uganda [2.478, 31.085]</p>
    
    <canvas id="pulseChart" width="400" height="200"></canvas>

    <div class="stats">
        <div>
            <span class="label">Status</span><br>
            <strong>Verified Regenerative</strong>
        </div>
        <div>
            <span class="label">Carbon Sequestered</span><br>
            <strong>+2.4 Tons/Hectare</strong>
        </div>
    </div>

    <button class="btn" onclick="togglePulse()">Toggle Stochastic Smoothing</button>
</div>

<script>
    const ctx = document.getElementById('pulseChart').getContext('2d');
    
    // Raw, noisy data (simulating satellite interference)
    const rawData = [0.42, 0.48, 0.35, 0.52, 0.45, 0.61, 0.55, 0.68, 0.62, 0.75];
    
    // Stochastic smoothing logic (Moving Average + Noise Reduction)
    const smoothData = rawData.map((val, i, arr) => {
        if (i === 0) return val;
        return (val + arr[i-1]) / 2; // Basic smoothing engine
    });

    let showingSmooth = false;

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct'],
            datasets: [{
                label: 'Satellite Signal (NDVI)',
                data: rawData,
                borderColor: '#666',
                borderWidth: 1,
                pointRadius: 2,
                fill: false,
                tension: 0
            }]
        },
        options: {
            scales: { y: { min: 0, max: 1 } },
            plugins: { legend: { display: false } }
        }
    });

    function togglePulse() {
        showingSmooth = !showingSmooth;
        chart.data.datasets[0].data = showingSmooth ? smoothData : rawData;
        chart.data.datasets[0].borderColor = showingSmooth ? '#000' : '#666';
        chart.data.datasets[0].borderWidth = showingSmooth ? 3 : 1;
        chart.data.datasets[0].tension = showingSmooth ? 0.4 : 0;
        chart.update();
    }
</script>

</body>
</html>
